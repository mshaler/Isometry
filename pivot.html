<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pivot Table — Design Preview</title>
  <link rel="stylesheet" href="/src/styles/pivot.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--pv-bg);
    }
    #pivot-root { height: 100%; }
    /* Theme toggle in top-right */
    .theme-toggle {
      position: fixed; top: 12px; right: 12px; z-index: 100;
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--pv-gridline);
      background: var(--pv-surface); color: var(--pv-fg); cursor: pointer;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="
    const t = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = t;
    this.textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
  ">🌙 Dark</button>
  <div id="pivot-root"></div>
  <script type="module">
    import { PivotTable } from '/src/views/pivot/PivotTable.ts';
    const table = new PivotTable();
    table.mount(document.getElementById('pivot-root'));
  </script>
</body>
</html>
