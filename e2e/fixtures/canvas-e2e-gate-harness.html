<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas E2E Gate Harness</title>
  <style>
    body { margin: 0; padding: 16px; background: #1a1a1a; color: #fff; font-family: sans-serif; }
    #root { width: 800px; height: 600px; border: 1px solid #444; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { SuperWidget } from '/src/superwidget/SuperWidget.ts';
    import { register, getCanvasFactory } from '/src/superwidget/registry.ts';
    import { ExplorerCanvasStub } from '/src/superwidget/ExplorerCanvasStub.ts';
    import { ViewCanvasStub } from '/src/superwidget/ViewCanvasStub.ts';
    import { EditorCanvasStub } from '/src/superwidget/EditorCanvasStub.ts';

    // Register all 3 canvas IDs so the 6-direction transition matrix works
    register('explorer-1', {
      canvasType: 'Explorer',
      create: () => new ExplorerCanvasStub('explorer-1'),
    });
    register('view-1', {
      canvasType: 'View',
      create: (binding) => new ViewCanvasStub('view-1', binding ?? 'Unbound'),
    });
    register('editor-1', {
      canvasType: 'Editor',
      create: () => new EditorCanvasStub('editor-1'),
    });

    const factory = getCanvasFactory();
    const sw = new SuperWidget(factory);
    sw.mount(document.getElementById('root'));

    // Expose commitProjection API for Playwright tests
    window.__sw = {
      commitProjection: (overrides) => sw.commitProjection(overrides),
      getWidget: () => sw,
    };
  </script>
</body>
</html>
