name: CI

on:
  push:
    branches: ['**']

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: biomejs/setup-biome@v2
        with:
          version: latest
      - run: biome ci .

  lint-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Stylelint CSS
        run: npm run lint:css

  css-import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check for orphan CSS files
        run: bash scripts/check-css-imports.sh

  display-reset-check:
    runs-on: ubuntu-latest
    # WARNING MODE: lists violations but does not fail CI (exit 0)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - name: Check for style.display = '' anti-pattern
        run: bash scripts/check-display-reset.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npx vitest --run

  environment-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check WASM/jsdom boundary violations
        run: |
          CANDIDATES=$(grep -rl '@vitest-environment jsdom' tests/ || true)
          VIOLATIONS=""
          for f in $CANDIDATES; do
            # Check for realDb (always a violation in jsdom context)
            if grep -q 'realDb' "$f" 2>/dev/null; then
              VIOLATIONS="$VIOLATIONS $f"
              continue
            fi
            # Check for Database import — but exclude "import type" lines
            if grep -v '^import type' "$f" | grep -q 'from.*database/Database' 2>/dev/null; then
              VIOLATIONS="$VIOLATIONS $f"
            fi
          done
          VIOLATIONS=$(echo "$VIOLATIONS" | xargs)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: WASM/jsdom boundary violation detected in:"
            echo "$VIOLATIONS"
            echo ""
            echo "These files mix @vitest-environment jsdom with realDb/Database imports."
            echo "See tests/ENVIRONMENT.md for the rule and how to fix."
            exit 1
          fi
          echo "No WASM/jsdom boundary violations found."

  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # SOFT GATE: flip to `false` after 3 consecutive green runs on main. See PROJECT.md Performance Contracts for promotion procedure.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run bench:budgets

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      # Cache Playwright browsers to save 30-60s per run
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/report/
            e2e/test-results/
          retention-days: 7
